spring.application.name=flight-service
server.port=8082

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=flight-service

spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:3306/airnexus_flight
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jackson.serialization.write-dates-as-timestamps=false

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=6379
spring.cache.type=redis

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
rabbitmq.exchange=airnexus.exchange
rabbitmq.queue.notification=notification.queue
rabbitmq.routing-key.notification=notification.*

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
