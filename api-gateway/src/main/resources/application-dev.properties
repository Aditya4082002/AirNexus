# =============================================
# API GATEWAY - Dev Configuration
# =============================================
spring.application.name=api-gateway
server.port=8080

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# CORS config
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000,http://localhost:8080
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

# JWT Secret (must match auth-service)
jwt.secret=7f9d2c4a8b1e6f3c9a0d5e7b2c4f8a1d9b6c3e5f7a2d8c1b4e6f9a0c3d7b2e5f

# SWAGGER AGGREGATION - All microservices shown in one Swagger UI
# Access: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs

springdoc.swagger-ui.urls[1].name=Airline Service
springdoc.swagger-ui.urls[1].url=/airline-service/v3/api-docs

springdoc.swagger-ui.urls[2].name=Flight Service
springdoc.swagger-ui.urls[2].url=/flight-service/v3/api-docs

springdoc.swagger-ui.urls[3].name=Seat Service
springdoc.swagger-ui.urls[3].url=/seat-service/v3/api-docs

springdoc.swagger-ui.urls[4].name=Booking Service
springdoc.swagger-ui.urls[4].url=/booking-service/v3/api-docs

springdoc.swagger-ui.urls[5].name=Passenger Service
springdoc.swagger-ui.urls[5].url=/passenger-service/v3/api-docs

springdoc.swagger-ui.urls[6].name=Payment Service
springdoc.swagger-ui.urls[6].url=/payment-service/v3/api-docs

springdoc.swagger-ui.urls[7].name=Notification Service
springdoc.swagger-ui.urls[7].url=/notification-service/v3/api-docs


# =============================================
# ROUTES - USING EUREKA (LOAD BALANCED)
# =============================================

# AUTH SERVICE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# AIRLINE SERVICE
spring.cloud.gateway.routes[1].id=airline-service
