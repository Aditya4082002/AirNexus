# BASIC SERVICE CONFIG
spring.application.name=auth-service
server.port=8081
server.address=localhost

# EUREKA CONFIG
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Force IP registration
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.hostname=localhost

# DATABASE (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/airnexus_auth
spring.datasource.username=root
spring.datasource.password=system
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT CONFIG
jwt.secret=7f9d2c4a8b1e6f3c9a0d5e7b2c4f8a1d9b6c3e5f7a2d8c1b4e6f9a0c3d7b2e5f
jwt.expiration=86400000

# Google OAuth2 Configuration
# google.client.id=clinet id
# spring.security.oauth2.client.registration.google.client-id=clinet id
# spring.security.oauth2.client.registration.google.client-secret=client secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# SWAGGER / SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
