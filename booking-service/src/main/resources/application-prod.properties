spring.application.name=booking-service
server.port=8084

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=booking-service
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:3306/airnexus_booking
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=6379
spring.cache.type=redis

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
rabbitmq.exchange=airnexus.exchange
rabbitmq.queue.notification=notification.queue
rabbitmq.routing-key.notification=notification.#

management.endpoints.web.exposure.include=health,info,circuitbreakers,retries
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.health.retries.enabled=true

spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.alphanumeric-ids.enabled=true

resilience4j.circuitbreaker.instances.flightService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.flightService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.flightService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.flightService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.flightService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.flightService.recordExceptions[0]=java.lang.Exception

resilience4j.circuitbreaker.instances.seatService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.seatService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.seatService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.seatService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.seatService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.seatService.recordExceptions[0]=java.lang.Exception

resilience4j.circuitbreaker.instances.passengerService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.passengerService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.passengerService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.passengerService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.passengerService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.passengerService.recordExceptions[0]=java.lang.Exception

logging.level.io.github.resilience4j=WARN

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false
